name: FreeCAD Patcher

on:
  push:
    branches: [main]
    paths:
      - 'freecad/patches/**'
      - '.github/workflows/freecad-patcher.yml'
  pull_request:
    paths:
      - 'freecad/patches/**'
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC — catch upstream refactors that break the patcher
    - cron: '0 6 * * 1'

jobs:
  patcher:
    name: ${{ matrix.ref }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ref:
          - '1.1.1'
          - 'main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone FreeCAD ${{ matrix.ref }}
        run: |
          git clone --depth=1 --branch '${{ matrix.ref }}' \
            https://github.com/FreeCAD/FreeCAD.git /tmp/freecad-source

      - name: Patcher dry-run (--check)
        run: |
          python3 freecad/patches/apply-spacemouse-fix.py --check /tmp/freecad-source

      - name: Apply patches
        run: |
          python3 freecad/patches/apply-spacemouse-fix.py /tmp/freecad-source

      - name: Verify all patched files still parse as C++
        run: |
          # Cheap sanity check: source files mustn't contain merge markers
          # or unbalanced braces from a botched patch.
          for f in $(cd /tmp/freecad-source && git diff --name-only); do
            full="/tmp/freecad-source/$f"
            if grep -qE '^(<<<<<<<|=======|>>>>>>>)' "$full"; then
              echo "FAIL: merge markers in $f"
              exit 1
            fi
          done
          echo "No merge markers found in patched files."
