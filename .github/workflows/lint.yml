name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          # warnings fail the job, info/style issues just print
          shellcheck --severity=warning install.sh uninstall.sh
          shellcheck --severity=warning freecad/scripts/*.sh

  bash-syntax:
    name: bash -n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse all shell scripts
        run: |
          for f in install.sh uninstall.sh freecad/scripts/*.sh; do
            echo "checking $f"
            bash -n "$f"
          done

  python-syntax:
    name: python compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile all Python files
        run: |
          for f in $(find . -name '*.py' -not -path './.git/*' -not -path '*/__pycache__/*'); do
            echo "compiling $f"
            python3 -m py_compile "$f"
          done
